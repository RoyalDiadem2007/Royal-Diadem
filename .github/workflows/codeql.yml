# CodeQL static analysis — scans for security vulnerabilities in JS/TS on every
# push, PR, and a weekly schedule (catches newly-published query packs).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 8 * * 1' # Mondays 08:30 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: github/codeql-action/analyze@v4
