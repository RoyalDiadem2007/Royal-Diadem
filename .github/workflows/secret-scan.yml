# Gitleaks — scans every push/PR (full history) for committed secrets.
# Defense-in-depth alongside GitHub push protection (enable per
# docs/KEYS_SETUP.md §5): Supabase auto-revokes leaked sb_secret_ keys, but the
# rule is that a key never lands in git at all (docs/SUPABASE_RULES.md §1).
name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so old commits are scanned too

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
