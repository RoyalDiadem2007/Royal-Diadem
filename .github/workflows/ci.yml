# CI — every push and PR must pass the same gates the commit guard enforces
# locally (CLAUDE.md §3): lint clean, types clean, all tests passing, build OK.
# Deployment is handled by the Vercel Git integration once the project is
# linked (docs/KEYS_SETUP.md §4) — CI's job is to block broken code, not ship.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gates:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Test (100% pass, 0 skipped)
        run: npm test

      - name: Build
        run: npm run build

  edge-functions:
    name: Deno check (Edge Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Edge Functions
        working-directory: supabase/functions
        # Glob so newly added functions can never slip past unchecked.
        run: deno check */index.ts

  e2e:
    name: E2E (real local stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Start local Supabase stack (applies migrations)
        run: supabase start -x studio,imgproxy,mailpit,realtime,storage-api,vector,logflare

      - name: Serve Edge Functions (Turnstile always-pass TEST secret)
        run: |
          echo "TURNSTILE_SECRET_KEY=1x0000000000000000000000000000000AA" > supabase/functions/.env
          supabase functions serve --env-file supabase/functions/.env &
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://127.0.0.1:54321/functions/v1/auth-session; then exit 0; fi
            sleep 2
          done
          echo "functions runtime did not become ready" && exit 1

      - name: Run E2E suite (no mocks)
        run: |
          SUPABASE_E2E_SERVICE_KEY="$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" \
            npm run test:e2e

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      # High+ vulnerabilities fail the build; triage per CLAUDE.md §8 —
      # never ship known CVEs.
      - name: npm audit (high and above)
        run: npm audit --audit-level=high
