# Dependabot — automated dependency update PRs. Majors are separate, reviewed
# changes (CLAUDE.md §8): Dependabot opens the PR, CI gates it, a human merges.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
